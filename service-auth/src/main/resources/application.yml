server:
  port: 8081

spring:
  application:
    name: service-auth
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5438/food_ordering_auth
    username: postgres
    password: 10112004
    driver-class-name: org.postgresql.Driver
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Security / OAuth2
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:tu-dien-sau}
            client-secret: ${GOOGLE_CLIENT_SECRET:tu-dien-sau}
            scope:
              - email
              - profile

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# JWT Configuration
jwt:
  secret: Zm9vZE9yZGVyaW5nU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uMjAyNFZlcnlMb25nQW5kU2VjdXJlS2V5MTIzNDU2
  expiration: 86400000  # 24 hours in milliseconds

# Logging
logging:
  level:
    com.foodordering.auth: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "[%d{yyyy-MM-dd HH:mm:ss}] [%level] [AUTH-SERVICE] [%X{traceId}] %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
