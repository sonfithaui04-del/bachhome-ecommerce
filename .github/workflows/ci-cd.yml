# GitHub Actions CI/CD Pipeline for Food Ordering System
# Triggers on push to main branch and pull requests

name: Food Ordering CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ============================================
  # JOB 1: Build and Test All Services
  # ============================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Build Eureka Server
      - name: Build Eureka Server
        run: |
          cd eureka-server
          mvn clean package -DskipTests

      # Build API Gateway
      - name: Build API Gateway
        run: |
          cd api-gateway
          mvn clean package -DskipTests

      # Build Service Auth
      - name: Build Service Auth
        run: |
          cd service-auth
          mvn clean package -DskipTests

      # Build Service Menu
      - name: Build Service Menu
        run: |
          cd service-menu
          mvn clean package -DskipTests

      # Build Service Order
      - name: Build Service Order
        run: |
          cd service-order
          mvn clean package -DskipTests

      # Build Service Payment
      - name: Build Service Payment
        run: |
          cd service-payment
          mvn clean package -DskipTests

      # Build Service Inventory
      - name: Build Service Inventory
        run: |
          cd service-inventory
          mvn clean package -DskipTests

      # Build Service Notification
      - name: Build Service Notification
        run: |
          cd service-notification
          mvn clean package -DskipTests

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: java-builds
          path: |
            */target/*.jar
          retention-days: 1

  # ============================================
  # JOB 2: Build Docker Images
  # ============================================
  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: java-builds

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push all service images
      - name: Build and push Eureka Server
        uses: docker/build-push-action@v5
        with:
          context: ./eureka-server
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/eureka-server:latest

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:latest

      - name: Build and push Service Auth
        uses: docker/build-push-action@v5
        with:
          context: ./service-auth
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/service-auth:latest

      - name: Build and push Service Menu
        uses: docker/build-push-action@v5
        with:
          context: ./service-menu
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/service-menu:latest

      - name: Build and push Service Order
        uses: docker/build-push-action@v5
        with:
          context: ./service-order
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/service-order:latest

      - name: Build and push Service Payment
        uses: docker/build-push-action@v5
        with:
          context: ./service-payment
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/service-payment:latest

      - name: Build and push Service Inventory
        uses: docker/build-push-action@v5
        with:
          context: ./service-inventory
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/service-inventory:latest

      - name: Build and push Service Notification
        uses: docker/build-push-action@v5
        with:
          context: ./service-notification
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/service-notification:latest

  # ============================================
  # JOB 3: Deploy to Kubernetes (Optional)
  # ============================================
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      # Uncomment and configure when K8s cluster is available
      # - name: Configure kubectl
      #   run: |
      #     echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
      #     export KUBECONFIG=kubeconfig

      # - name: Deploy to Kubernetes
      #   run: |
      #     kubectl apply -f k8s/namespace.yaml
      #     kubectl apply -f k8s/

      - name: Deployment placeholder
        run: |
          echo "✅ Docker images built and pushed successfully!"
          echo "📦 Kubernetes deployment ready when cluster is configured"
          echo "🔗 Images available at: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}"
