server:
  port: 8082

spring:
  application:
    name: service-menu
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5433/food_ordering_menu
    username: postgres
    password: 10112004
    driver-class-name: org.postgresql.Driver
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Logging
logging:
  level:
    com.foodordering.menu: DEBUG
  pattern:
    console: "[%d{yyyy-MM-dd HH:mm:ss}] [%level] [MENU-SERVICE] [%X{traceId}] %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
